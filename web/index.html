<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vigil — BGP Route Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0b0f14; --panel: #121820; --border: #223041; --text: #d7e1ea;
    --muted: #7d8ea3; --accent: #4fb0ff; --crit: #ff5468; --warn: #ffb454;
    --info: #4fd1a5; --good: #3ddc84;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header h1 span { color: var(--accent); }
  #conn { font-size: 12px; color: var(--muted); }
  #conn.live { color: var(--good); }
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  .stat .label { color: var(--muted); font-size: 12px; text-transform: uppercase;
    letter-spacing: .04em; }
  .stat .value { font-size: 26px; font-weight: 650; margin-top: 4px; }
  section { margin-bottom: 28px; }
  section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); margin: 0 0 10px; }
  table { width: 100%; border-collapse: collapse; background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--border);
    font-size: 13px; }
  th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .sev-critical { background: rgba(255,84,104,.15); color: var(--crit); }
  .sev-warning { background: rgba(255,180,84,.15); color: var(--warn); }
  .sev-info { background: rgba(79,209,165,.15); color: var(--info); }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; }
  .empty { color: var(--muted); padding: 20px; text-align: center; }
  #search { display: flex; gap: 8px; margin-bottom: 12px; }
  #search input, #search select {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 7px 10px; border-radius: 6px; font-size: 13px;
  }
  #search button {
    background: var(--accent); border: none; color: #06131f; font-weight: 600;
    padding: 7px 14px; border-radius: 6px; cursor: pointer;
  }
</style>
</head>
<body>
<header>
  <h1>Vigil <span>·</span> BGP Route Monitor</h1>
  <div id="conn">connecting…</div>
</header>
<main>
  <div class="stats" id="stats"></div>

  <section>
    <h2>Alerts</h2>
    <div id="search">
      <select id="f-type">
        <option value="">all types</option>
        <option value="hijack">hijack</option>
        <option value="subprefix">subprefix</option>
        <option value="leak">leak</option>
        <option value="rpki_invalid">rpki_invalid</option>
        <option value="spike">spike</option>
      </select>
      <input id="f-prefix" placeholder="filter by prefix (e.g. 192.0.2.0/24)">
      <button onclick="loadAlerts()">Filter</button>
    </div>
    <table>
      <thead><tr>
        <th>Time</th><th>Type</th><th>Severity</th><th>Prefix</th>
        <th>Expected</th><th>Observed</th><th>Peer</th><th>Summary</th>
      </tr></thead>
      <tbody id="alerts"><tr><td class="empty" colspan="8">loading…</td></tr></tbody>
    </table>
  </section>
</main>

<script>
const $ = (s) => document.querySelector(s);

function fmtTime(ts) {
  return new Date(ts * 1000).toISOString().replace('T', ' ').replace(/\.\d+Z$/, 'Z');
}

async function loadStats() {
  try {
    const r = await fetch('/api/v1/stats');
    const d = await r.json();
    const conn = $('#conn');
    if (d.rislive) {
      conn.textContent = d.rislive.connected
        ? `live · ${d.rislive.messages} msgs / ${d.rislive.events} events`
        : 'reconnecting…';
      conn.className = d.rislive.connected ? 'live' : '';
    } else {
      conn.textContent = 'replay mode';
    }
    const totalAlerts = Object.values(d.alerts_total).reduce((a, b) => a + b, 0);
    $('#stats').innerHTML = [
      ['Prefixes', d.rib.prefixes],
      ['Routes', d.rib.routes],
      ['Events processed', d.engine.events],
      ['Alerts (total)', totalAlerts],
      ['Hijacks', d.alerts_total.hijack],
      ['Sub-prefix', d.alerts_total.subprefix],
      ['Leaks', d.alerts_total.leak],
      ['RPKI invalid', d.alerts_total.rpki_invalid],
      ['RIB memory', (d.rib.memory_bytes / 1048576).toFixed(1) + ' MB'],
    ].map(([label, value]) =>
      `<div class="stat"><div class="label">${label}</div><div class="value">${value}</div></div>`
    ).join('');
  } catch (e) { /* server not up yet */ }
}

async function loadAlerts() {
  const type = $('#f-type').value;
  const prefix = $('#f-prefix').value.trim();
  const params = new URLSearchParams({ limit: '100' });
  if (type) params.set('type', type);
  if (prefix) params.set('prefix', prefix);

  try {
    const r = await fetch('/api/v1/alerts?' + params.toString());
    const d = await r.json();
    const tbody = $('#alerts');
    if (!d.alerts.length) {
      tbody.innerHTML = '<tr><td class="empty" colspan="8">no alerts</td></tr>';
      return;
    }
    tbody.innerHTML = d.alerts.map(a => `
      <tr>
        <td class="mono">${fmtTime(a.timestamp)}</td>
        <td>${a.type}</td>
        <td><span class="badge sev-${a.severity}">${a.severity}</span></td>
        <td class="mono">${a.prefix || '-'}</td>
        <td class="mono">${a.expected_asn ? 'AS' + a.expected_asn : '-'}</td>
        <td class="mono">${a.observed_asn ? 'AS' + a.observed_asn : '-'}</td>
        <td class="mono">${a.peer || '-'}</td>
        <td>${a.summary}</td>
      </tr>
    `).join('');
  } catch (e) { /* server not up yet */ }
}

loadStats();
loadAlerts();
setInterval(loadStats, 3000);
setInterval(loadAlerts, 5000);
</script>
</body>
</html>
